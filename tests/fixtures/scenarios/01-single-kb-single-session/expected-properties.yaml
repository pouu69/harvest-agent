# Scenario 01 — single KB, single session, EXTRACT-only validation.
#
# Schema follows harvest.md §16.3.2 (lines 2763-2783) with one extension: the
# `extract` block captures EXTRACT-tool-level expectations (Task 22a's actual
# scope; the §16.3.2 `post_run_assertions` block is intentionally minimal here
# because Task 20 — `harvest start` E2E — owns the full agent-behavior loop).
#
# Every field below is consumed by at least one assertion in
# tests/scenarios/01-single-kb-single-session.test.ts. Documentation-only
# context (e.g. what's deferred to later tasks) lives in README.md, not here.

session_id: sess-jwt-refresh-loop-001
transcript: transcripts/sess-jwt-refresh-loop-001.jsonl
kb_chain_paths:
  - /Users/dev/projects/myapp/apps/web/.harvest

extract:
  # 3-run replay loop: 1 happy + 2 distinct validator-failure variants.
  # The split is exact (FixtureLlmCaller is deterministic) and exercises both
  # the success path and two distinct rejection paths through the 9-step
  # validator. This is a synthetic floor (per SPEC_DEFECTS I-8) — NOT a
  # measurement of real LLM failure rate. See README for rationale.
  total_runs: 3
  min_successes: 1                # smoke — proves the happy path works
  expected_success_count: 1       # exact (deterministic replay)
  expected_failure_count: 2       # exact (deterministic replay)

  # Per-success expectations: the happy fixture emits exactly 4 valid candidates
  # (one per category). The 4/4 tight bound is intentional given that replay
  # mode is fully deterministic — we want to detect any drift if the validator
  # or fixture changes. The validator never drops these candidates.
  on_success:
    candidate_count_min: 4         # tight bound — fixture is deterministic
    candidate_count_max: 4         # tight bound — fixture is deterministic
    rejected_count: 0
    must_have_category_at_least_one:
      - decision
      - learning
      - reusable
      - anti-pattern
    must_contain_tag_at_least_one:
      - auth
      - jwt
      - concurrency
      - security
      - oauth
      - axios
      - anti_pattern
      - promise
      - pattern
    universality_distribution:
      app_specific_min: 1
      universal_min: 1
      unverified_min: 1
    language_used: ko

  # Per-failure expectations: validator must reject all candidates.
  on_failure:
    error_code: all_items_rejected
    rejected_count_min: 1

# Replay assertions per §16.3.2 agent_behavior block — adapted for the
# extract-tool layer. We don't run the full Agent yet (Task 20), so
# `must_call_llm_caller_at_least` here means "the LlmCaller is invoked at least
# once per run" (sanity check the wiring works).
replay_assertions:
  must_call_llm_caller_at_least: 3  # one call per run
